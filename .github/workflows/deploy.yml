name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ secrets.VITE_COGNITO_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ secrets.VITE_COGNITO_HOSTED_UI_DOMAIN }}
          VITE_COGNITO_REDIRECT_SIGN_IN: ${{ secrets.VITE_COGNITO_REDIRECT_SIGN_IN }}
          VITE_COGNITO_REDIRECT_SIGN_OUT: ${{ secrets.VITE_COGNITO_REDIRECT_SIGN_OUT }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VITE_AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://lms-frontend-dev-fceacbe3 --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
